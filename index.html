<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdriAPP Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #000000; 
            --card-bg: #1c1c1e; 
            --card-bg-inner: #2c2c2e; 
            --accent-color: #30d158; 
            --text-color: #ffffff; 
            --text-secondary: #8e8e93; 
            --danger: #ff453a; 
            --nutrition-color: #ff9500;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 90px; }
        header { background-color: var(--card-bg); padding: 20px; text-align: center; border-bottom: 1px solid #2c2c2e; position: sticky; top: 0; z-index: 100; }
        header h1 { font-size: 1.4rem; font-weight: 700; }
        header p { color: var(--accent-color); font-size: 0.85rem; margin-top: 4px; font-weight: 600; }
        .container { padding: 16px; max-width: 500px; margin: 0 auto; }
        .screen { display: none; } 
        .screen.active { display: block; }
        .card { background-color: var(--card-bg); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
        .card h2 { font-size: 1.1rem; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; display: block; margin-top: 10px; }
        input, select { width: 100%; background-color: var(--card-bg-inner); border: 1px solid #3a3a3c; border-radius: 10px; padding: 12px; color: var(--text-color); font-size: 1rem; margin-top: 4px; outline: none; }
        input:focus, select:focus { border-color: var(--accent-color); }
        .btn { background-color: var(--accent-color); color: #000; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; margin-top: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn:active { transform: scale(0.98); }
        .log-item { background-color: var(--card-bg-inner); padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent-color); position: relative; }
        .log-item.comida { border-left-color: var(--nutrition-color); }
        .log-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; padding-right: 24px; }
        .log-title { font-weight: 600; font-size: 1rem; }
        .log-details { font-size: 0.9rem; margin-top: 2px; color: #e5e5ea; }
        .btn-delete { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--danger); background: none; border: none; cursor: pointer; }
        nav { position: fixed; bottom: 0; width: 100%; background-color: var(--card-bg); border-top: 1px solid #2c2c2e; display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); background: none; border: none; font-size: 0.7rem; font-weight: 500; width: 33%; cursor: pointer; }
        .nav-item .material-icons-round { font-size: 1.5rem; margin-bottom: 2px; }
        .nav-item.active { color: var(--accent-color); }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background-color: var(--accent-color); color: black; padding: 12px 24px; border-radius: 30px; font-weight: 600; z-index: 1000; transition: transform 0.3s; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast">¡Registrado!</div>

    <header>
        <h1>AdriAPP</h1>
        <p id="header-date"></p>
    </header>

    <div class="container">
        <!-- PANTALLA ENTRENO -->
        <div id="screen-entreno" class="screen active">
            <div class="card">
                <h2><span class="material-icons-round" style="color: var(--accent-color)">fitness_center</span> Nueva Serie</h2>
                
                <label>Tipo de Día / Bloque</label>
                <select id="entreno-bloque" onchange="actualizarEjercicios()">
                    <option value="Lunes: Torso">Lunes: Torso</option>
                    <option value="Martes: Espalda y Bíceps">Martes: Espalda y Bíceps</option>
                    <option value="Miércoles: Recuperación Activa y Core">Miércoles: Recuperación Activa y Core</option>
                    <option value="Jueves: Torso Completo">Jueves: Torso Completo</option>
                </select>
                
                <label>Ejercicio</label>
                <select id="entreno-ejercicio"></select>
                
                <div style="display:flex; gap:12px;">
                    <div style="flex:1;">
                        <label>Peso (kg)</label>
                        <input type="number" id="entreno-peso" placeholder="0" step="0.5">
                    </div>
                    <div style="flex:1;">
                        <label>Reps</label>
                        <input type="number" id="entreno-repes" placeholder="0">
                    </div>
                </div>
                
                <button class="btn" onclick="guardarEntreno()">
                    <span class="material-icons-round">add_circle</span> Registrar Serie
                </button>
            </div>
        </div>

        <!-- PANTALLA COMIDAS -->
        <div id="screen-comidas" class="screen">
            <div class="card">
                <h2><span class="material-icons-round" style="color: var(--nutrition-color)">local_fire_department</span> Registro de Kcal</h2>
                
                <label>Momento</label>
                <select id="comida-momento">
                    <option value="Desayuno">Desayuno</option>
                    <option value="Comida">Comida</option>
                    <option value="Cena">Cena</option>
                    <option value="Snack Pre-Entreno">Snack Pre-Entreno</option>
                    <option value="Comida Extra">Comida Extra</option>
                </select>
                
                <label>Calorías (kcal)</label>
                <input type="number" id="comida-kcal" placeholder="Ej: 500">
                
                <button class="btn" style="background-color: var(--nutrition-color)" onclick="guardarComida()">
                    <span class="material-icons-round">restaurant</span> Añadir Kcal
                </button>
            </div>
        </div>

        <!-- PANTALLA HISTORIAL -->
        <div id="screen-historial" class="screen">
            <h2 style="font-size:1.2rem; margin-bottom:12px;">Historial de Hoy</h2>
            <div id="lista-historial"></div>
        </div>
    </div>

    <!-- NAVEGACIÓN -->
    <nav>
        <button class="nav-item active" onclick="cambiarPantalla('screen-entreno', this)">
            <span class="material-icons-round">fitness_center</span>Entreno
        </button>
        <button class="nav-item" onclick="cambiarPantalla('screen-comidas', this)">
            <span class="material-icons-round">local_dining</span>Calorías
        </button>
        <button class="nav-item" onclick="cambiarPantalla('screen-historial', this)">
            <span class="material-icons-round">history</span>Historial
        </button>
    </nav>

    <script>
        // Base de datos de ejercicios extraídos de tu rutina nativa
        const ejerciciosDB = {
            "Lunes: Torso": [
                "Press de banca con mancuernas",
                "Press militar sentado con mancuernas",
                "Aperturas en máquina (Pec Deck)",
                "Extensiones de tríceps en polea con cuerda"
            ],
            "Martes: Espalda y Bíceps": [
                "Jalón al pecho en polea (agarre amplio)",
                "Remo en máquina (soporte al pecho)",
                "Pájaros con mancuernas (hombro posterior)",
                "Curl de bíceps alterno con mancuernas"
            ],
            "Miércoles: Recuperación Activa y Core": [
                "Cardio: Bicicleta estática o elíptica",
                "Core: Plancha abdominal",
                "Core: Press Pallof"
            ],
            "Jueves: Torso Completo": [
                "Press inclinado con mancuernas",
                "Remo en polea baja (agarre estrecho/gironda)",
                "Cruces en polea alta (pecho inferior)"
            ]
        };

        // Mostrar fecha
        document.getElementById('header-date').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }).toUpperCase();

        function actualizarEjercicios() {
            const bloque = document.getElementById('entreno-bloque').value;
            const selector = document.getElementById('entreno-ejercicio');
            selector.innerHTML = '';
            ejerciciosDB[bloque].forEach(ej => {
                const opt = document.createElement('option');
                opt.value = ej; opt.innerText = ej;
                selector.appendChild(opt);
            });
        }

        actualizarEjercicios();

        function cambiarPantalla(sId, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(sId).classList.add('active');
            btn.classList.add('active');
            if(sId === 'screen-historial') renderHistorial();
        }

        function showToast(msj, color = '#30d158') {
            const t = document.getElementById('toast');
            t.innerText = msj; t.style.backgroundColor = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function guardarEntreno() {
            const peso = document.getElementById('entreno-peso').value;
            const repes = document.getElementById('entreno-repes').value;
            if(!peso || !repes) { showToast('Introduce peso y repeticiones', '#ff453a'); return; }

            const item = {
                id: Date.now(),
                tipo: 'entreno',
                bloque: document.getElementById('entreno-bloque').value,
                ejercicio: document.getElementById('entreno-ejercicio').value,
                peso: peso,
                repes: repes,
                hora: new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'})
            };

            let hist = JSON.parse(localStorage.getItem('adri_datos') || '[]');
            hist.unshift(item);
            localStorage.setItem('adri_datos', JSON.stringify(hist));
            showToast('Serie guardada');
            document.getElementById('entreno-peso').value = '';
            document.getElementById('entreno-repes').value = '';
        }

        function guardarComida() {
            const kcal = document.getElementById('comida-kcal').value;
            if(!kcal) { showToast('Introduce las kcal', '#ff453a'); return; }

            const item = {
                id: Date.now(),
                tipo: 'comida',
                momento: document.getElementById('comida-momento').value,
                kcal: kcal,
                hora: new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'})
            };

            let hist = JSON.parse(localStorage.getItem('adri_datos') || '[]');
            hist.unshift(item);
            localStorage.setItem('adri_datos', JSON.stringify(hist));
            showToast('Calorías guardadas', '#ff9500');
            document.getElementById('comida-kcal').value = '';
        }

        function renderHistorial() {
            const lista = document.getElementById('lista-historial');
            lista.innerHTML = '';
            const hist = JSON.parse(localStorage.getItem('adri_datos') || '[]');

            if(hist.length === 0) {
                lista.innerHTML = '<p style="color:var(--text-secondary); text-align:center; padding-top:20px;">No hay registros hoy.</p>';
                return;
            }

            hist.forEach(item => {
                const div = document.createElement('div');
                if(item.tipo === 'entreno') {
                    div.className = 'log-item';
                    div.innerHTML = `
                        <div class="log-header"><span>${item.hora} - ${item.bloque}</span></div>
                        <div class="log-title">${item.ejercicio}</div>
                        <div class="log-details"><strong>${item.peso} kg</strong> x <strong>${item.repes} reps</strong></div>
                        <button class="btn-delete" onclick="borrarItem(${item.id})"><span class="material-icons-round">delete</span></button>
                    `;
                } else {
                    div.className = 'log-item comida';
                    div.innerHTML = `
                        <div class="log-header"><span>${item.hora} - Nutrición</span></div>
                        <div class="log-title">${item.momento}</div>
                        <div class="log-details" style="color:var(--nutrition-color)"><strong>${item.kcal} kcal</strong></div>
                        <button class="btn-delete" onclick="borrarItem(${item.id})"><span class="material-icons-round">delete</span></button>
                    `;
                }
                lista.appendChild(div);
            });
        }

        function borrarItem(id) {
            let hist = JSON.parse(localStorage.getItem('adri_datos') || '[]');
            hist = hist.filter(item => item.id !== id);
            localStorage.setItem('adri_datos', JSON.stringify(hist));
            renderHistorial();
            showToast('Registro eliminado', '#ff453a');
        }
    </script>
</body>
</html>
